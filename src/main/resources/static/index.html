<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚀 TaskFlow Pro</h1>

    <h3 class="subtitle">
        Smart Task Management System
    </h3>

    <p class="developers">
        Developed By<br>
        <strong>AMOD PATHAK & POTHINA TEJASWINI</strong>
    </p>

    <div class="stats">

        <div class="stat-box">
            Total Tasks:
            <span id="totalTasks">0</span>
        </div>

        <div class="stat-box">
            Completed:
            <span id="completedTasks">0</span>
        </div>

    </div>

    <div class="task-form">

        <input
                type="text"
                id="title"
                placeholder="Task Title">

        <input
                type="text"
                id="description"
                placeholder="Description">

        <input
                type="date"
                id="deadline">

        <select id="priority">

            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>

        </select>

        <button onclick="addTask()">
            Add Task
        </button>

    </div>

    <input
            type="text"
            id="search"
            placeholder="Search Task..."
            onkeyup="searchTask()">

    <div id="taskList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
